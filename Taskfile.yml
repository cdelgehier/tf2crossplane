version: "3"

vars:
  SRC: tf2crossplane
  TESTS: tests

tasks:
  default:
    desc: List available tasks
    cmd: task --list

  # ── Dependencies ────────────────────────────────────────────────────────────

  install:
    desc: Install all dependencies (including dev)
    cmd: uv sync --all-groups
    # Skip if pyproject.toml and uv.lock haven't changed since last run
    sources:
      - pyproject.toml
      - uv.lock

  # ── Linting & formatting ────────────────────────────────────────────────────

  lint:
    desc: Run ruff linter
    cmd: uv run ruff check {{.SRC}} {{.TESTS}}

  fmt:
    desc: Format code with ruff
    cmd: uv run ruff format {{.SRC}} {{.TESTS}}

  fmt-check:
    desc: Check formatting without modifying files
    cmd: uv run ruff format --check {{.SRC}} {{.TESTS}}

  # ── Tests ───────────────────────────────────────────────────────────────────

  test:
    desc: Run test suite with coverage
    cmd: uv run pytest

  # ── Examples ─────────────────────────────────────────────────────────────────
  # Each example is self-contained: infra/ (XRDs) + stack/ (Stack XRD+Composition) + xr-*.yaml (dev)

  example:stackiams3:infra:iam:
    desc: Regenerate XIamRole XRD + Composition (examples/stackiams3/infra/iam/)
    cmd: |
      uv run tf2crossplane infra \
        --module-url 'git::https://github.com/terraform-aws-modules/terraform-aws-iam.git//modules/iam-role?ref=v6.4.0' \
        --output-dir examples/stackiams3/infra/iam/ \
        --group homelab.crossplane.io \
        --kind IamRole

  example:stackiams3:infra:s3:
    desc: Regenerate XS3Bucket XRD + Composition (examples/stackiams3/infra/s3/)
    cmd: |
      uv run tf2crossplane infra \
        --module-url 'git::https://github.com/terraform-aws-modules/terraform-aws-s3-bucket.git?ref=v4.6.0' \
        --output-dir examples/stackiams3/infra/s3/ \
        --group homelab.crossplane.io \
        --kind S3Bucket

  example:stackiams3:stack:
    desc: Regenerate StackIAMS3 XRD + Composition (examples/stackiams3/stack/)
    cmd: uv run tf2crossplane stack --file examples/stackiams3/stack/stackiams3.stack.yaml

  example:stackiams3:
    desc: Regenerate all of examples/stackiams3/ (infra iam + infra s3 + stack)
    cmds:
      - task: example:stackiams3:infra:iam
      - task: example:stackiams3:infra:s3
      - task: example:stackiams3:stack

  example:stackec2iams3:infra:ec2:
    desc: Regenerate XEC2Instance XRD + Composition (examples/stackec2iams3/infra/ec2/)
    cmd: |
      uv run tf2crossplane infra \
        --module-url 'git::https://github.com/terraform-aws-modules/terraform-aws-ec2-instance.git?ref=v6.3.0' \
        --output-dir examples/stackec2iams3/infra/ec2/ \
        --group homelab.crossplane.io \
        --kind EC2Instance

  example:stackec2iams3:infra:iam:
    desc: Regenerate XIamRole XRD + Composition (examples/stackec2iams3/infra/iam/)
    cmd: |
      uv run tf2crossplane infra \
        --module-url 'git::https://github.com/terraform-aws-modules/terraform-aws-iam.git//modules/iam-role?ref=v6.4.0' \
        --output-dir examples/stackec2iams3/infra/iam/ \
        --group homelab.crossplane.io \
        --kind IamRole

  example:stackec2iams3:stack:
    desc: Regenerate StackEC2IAMS3 XRD + Composition (examples/stackec2iams3/stack/)
    cmd: uv run tf2crossplane stack --file examples/stackec2iams3/stack/stackec2iams3.stack.yaml

  example:stackec2iams3:
    desc: Regenerate all of examples/stackec2iams3/ (infra ec2 + infra iam + stack)
    cmds:
      - task: example:stackec2iams3:infra:ec2
      - task: example:stackec2iams3:infra:iam
      - task: example:stackec2iams3:stack

  example:stackvm:infra:kms:
    desc: Regenerate XKms XRD + Composition (examples/stackvm/infra/kms/)
    cmd: |
      uv run tf2crossplane infra \
        --module-url 'git::https://github.com/terraform-aws-modules/terraform-aws-kms.git?ref=v4.2.0' \
        --output-dir examples/stackvm/infra/kms/ \
        --group homelab.crossplane.io \
        --kind Kms

  example:stackvm:infra:security-group:
    desc: Regenerate XSecurityGroup XRD + Composition (examples/stackvm/infra/security-group/)
    cmd: |
      uv run tf2crossplane infra \
        --module-url 'git::https://github.com/terraform-aws-modules/terraform-aws-security-group.git?ref=v5.3.1' \
        --output-dir examples/stackvm/infra/security-group/ \
        --group homelab.crossplane.io \
        --kind SecurityGroup

  example:stackvm:infra:ec2:
    desc: Regenerate XEC2Instance XRD + Composition (examples/stackvm/infra/ec2/)
    cmd: |
      uv run tf2crossplane infra \
        --module-url 'git::https://github.com/terraform-aws-modules/terraform-aws-ec2-instance.git?ref=v6.3.0' \
        --output-dir examples/stackvm/infra/ec2/ \
        --group homelab.crossplane.io \
        --kind EC2Instance

  example:stackvm:stack:
    desc: Regenerate StackVM XRD + Composition (examples/stackvm/stack/)
    cmd: uv run tf2crossplane stack --file examples/stackvm/stack/stackvm.stack.yaml

  example:stackvm:
    desc: Regenerate all of examples/stackvm/ (infra kms + security-group + ec2 + stack)
    cmds:
      - task: example:stackvm:infra:kms
      - task: example:stackvm:infra:security-group
      - task: example:stackvm:infra:ec2
      - task: example:stackvm:stack

  example:s3-computed-provider:
    desc: Regenerate XS3Bucket XRD + Composition (examples/s3-computed-provider/) — demonstrates extra_vars, provider_config_format, secret_name_format
    cmd: |
      uv run tf2crossplane infra \
        --module-url 'git::https://github.com/terraform-aws-modules/terraform-aws-s3-bucket.git?ref=v4.6.0' \
        --output-dir examples/s3-computed-provider/infra/ \
        --group homelab.crossplane.io \
        --kind S3Bucket \
        --provider-config-format 'aws-{target_account}-{target_region}' \
        --secret-name-format '{name}-s3-creds' \
        --extra-var 'target_account:string:AWS account ID to deploy into' \
        --extra-var 'target_region:string:AWS region:eu-west-1'

  # ── Pre-commit ──────────────────────────────────────────────────────────────

  pre-commit-install:
    desc: Install pre-commit hooks (pre-push + commit-msg)
    cmds:
      - pre-commit install
      - pre-commit install --hook-type commit-msg

  pre-commit:
    desc: Run all pre-commit hooks on staged files
    cmd: pre-commit run

  pre-commit-all:
    desc: Run all pre-commit hooks on all files
    cmd: pre-commit run --all-files

  # ── All-in-one ──────────────────────────────────────────────────────────────

  ci:
    desc: Run everything (lint + format check + tests)
    cmds:
      - task: lint
      - task: fmt-check
      - task: test
