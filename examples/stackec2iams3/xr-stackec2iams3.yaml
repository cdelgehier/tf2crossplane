apiVersion: homelab.crossplane.io/v1alpha1
kind: XStackEC2IAMS3
metadata:
  name: my-app
  namespace: crossplane-system
spec:
  providerConfig: aws-personal-eu-west-1
  ec2:
    ami_ssm_parameter: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    instance_type: t3.micro
    subnet_id: subnet-xxxxxxxxxxxxxxx
    # iam_instance_profile is wired automatically from iam.outputs.instance_profile_name
    # No manual two-pass required — the Stack composition propagates it via status.iamInstanceProfileName
    tags:
      env: production
      managedBy: crossplane
  iam:
    name: my-app-role
    # AWS IAM Statement IDs (Sids) must be alphanumeric only — no underscores or dashes.
    trust_policy_permissions:
      AllowEC2AssumeRole:
        effect: Allow
        actions:
          - sts:AssumeRole
        principals:
          - type: Service
            identifiers:
              - ec2.amazonaws.com
    create_instance_profile: true
    tags:
      env: production
      managedBy: crossplane
