apiVersion: homelab.crossplane.io/v1alpha1
kind: XStackVM
metadata:
  name: my-vm
  namespace: crossplane-system
spec:
  providerConfig: aws-personal-eu-west-1
  kms:
    # KMS key is created automatically and wired to ec2.root_block_device.kms_key_id
    description: my-vm root volume encryption key
    enable_key_rotation: true
    tags:
      env: production
      managedBy: crossplane
  security_group:
    name: my-vm-sg
    description: Security group for my-vm
    vpc_id: vpc-xxxxxxxxxxxxxxx
    ingress_with_cidr_blocks:
      - from_port: "22"
        to_port: "22"
        protocol: tcp
        cidr_blocks: 10.0.0.0/8
        description: SSH from VPN
    egress_with_cidr_blocks:
      - from_port: "0"
        to_port: "0"
        protocol: "-1"
        cidr_blocks: 0.0.0.0/0
        description: Allow all outbound
    tags:
      env: production
      managedBy: crossplane
  ec2:
    ami_ssm_parameter: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    instance_type: t3.micro
    subnet_id: subnet-xxxxxxxxxxxxxxx
    # wired automatically:
    #   kms.outputs.key_arn                      → root_block_device.kms_key_id
    #   static "true"                            → root_block_device.encrypted  (required by AWS when kms_key_id is set)
    #   security_group.outputs.security_group_id → vpc_security_group_ids
    tags:
      env: production
      managedBy: crossplane
