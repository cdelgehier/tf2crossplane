---
name: Commitizen Check

on:
  # Validate each commit on every push
  push:
    branches-ignore:
      - main

  # Validate all commits in a PR to main
  pull_request:
    branches:
      - main

jobs:
  # Check the last commit message
  check-commit:
    name: Check commit message
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Commitizen
        run: uv tool install commitizen

      - name: Check commit message
        run: uvx --from commitizen cz check --message "${{ github.event.head_commit.message }}"

  # Check all commits in the PR
  check-pr:
    name: Check all commits in PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Commitizen
        run: uv tool install commitizen

      - name: Check all commits in PR
        run: |
          # Get the base branch
          git fetch origin ${{ github.base_ref }}

          # Validate all commits from the base
          uvx --from commitizen cz check --rev-range origin/${{ github.base_ref }}..HEAD
