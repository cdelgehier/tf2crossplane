---
name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    name: Build and create GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build package
        run: uv build

      - name: Extract changelog section
        id: changelog
        run: |
          # Extract the changelog section for this version
          TAG="${{ steps.version.outputs.tag }}"

          CHANGELOG_SECTION=$(awk -v tag="$TAG" '
            /^## v/ {
              if (found) exit
              if ($2 == tag) found=1
              next
            }
            found {print}
          ' CHANGELOG.md)

          # If empty, use the complete changelog
          if [ -z "$CHANGELOG_SECTION" ]; then
            CHANGELOG_SECTION=$(cat CHANGELOG.md)
          fi

          # Save to a file to avoid escaping problems
          echo "$CHANGELOG_SECTION" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          tag_name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          # Attach wheel + sdist so users can install directly without PyPI:
          # pip install https://github.com/.../releases/download/vX.Y.Z/tf2crossplane-X.Y.Z-py3-none-any.whl
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "✅ GitHub Release created for version ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "📦 Release URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "🐍 Install: pip install ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/tf2crossplane-${{ steps.version.outputs.version }}-py3-none-any.whl" >> $GITHUB_STEP_SUMMARY
